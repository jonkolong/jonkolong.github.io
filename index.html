    <style>
        /* Mengunci layar agar TIDAK BISA DI-SCROLL sama sekali */
        body, html { 
            font-family: 'Poppins', sans-serif; 
            margin: 0; padding: 0;
            width: 100vw; height: 100vh;
            overflow: hidden; 
        }

        /* Container Video Background YouTube */
        .video-background-container {
            position: absolute; 
            top: 0; left: 0;
            width: 100%; height: 100%;
            overflow: hidden;
            z-index: -2;
            background-color: #000;
        }

        /* Iframe YouTube full cover */
        .video-background-container iframe {
            position: absolute; 
            top: 50%; left: 50%;
            width: 100vw; 
            height: 56.25vw; 
            min-height: 100vh; 
            min-width: 177.77vh; 
            transform: translate(-50%, -50%);
            pointer-events: none; 
        }

        /* Overlay gelap */
        .overlay {
            position: absolute; 
            top: 0; left: 0;
            width: 100%; height: 100%;
            background: rgba(0, 0, 0, 0.50); 
            z-index: -1;
        }

        /* Layout Utama */
        .content-wrapper {
            height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: space-evenly; 
            align-items: center;
            padding: 2vh 15px;
            color: white;
            text-align: center;
        }

        /* Header Section */
        .logo-img {
            height: clamp(50px, 8vh, 80px); 
            width: auto;
            margin-bottom: 1vh;
        }
        
        .header-title {
            font-size: clamp(1.2rem, 3vh, 1.8rem); 
            font-weight: 700;
            margin-bottom: 0;
        }

        .main-layout-container {
            width: 100%;
            max-width: 1400px; 
            margin: 0 auto;
        }

        /* Foto Pimpinan */
        .img-leader {
            max-height: 55vh; 
            width: 400px;
            object-fit: contain;
            filter: drop-shadow(0px 10px 15px rgba(0,0,0,0.5)); 
            transition: transform 0.4s ease;
        }

        .img-leader:hover {
            transform: scale(1.03);
        }

        /* PEMBATAS GRID */
        .grid-container {
            width: 100%;
            max-width: min(100%, 55vh); 
            margin: 0 auto;
        }

        /* Desain Kartu Layanan */
        .service-card {
            background: rgba(255, 255, 255, 0.08);
            backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.15);
            border-radius: 12px;
            aspect-ratio: 1 / 1; 
            width: 100%;
            display: flex; 
            flex-direction: column;
            justify-content: center; 
            align-items: center; 
            text-align: center;
            padding: 5px;
            transition: all 0.2s ease; 
            cursor: pointer;
            text-decoration: none; 
            color: white; 
        }

        .service-card:hover {
            transform: scale(1.05); 
            background: rgba(255, 255, 255, 0.15);
            box-shadow: 0 10px 20px rgba(0, 0, 0, 0.3);
            border-color: #0f7cf1;
            color: white; 
        }

        .icon-box { 
            color: #0f7cf1; 
            margin-bottom: 1vh; 
            transition: transform 0.3s ease;
            display: flex;
            align-items: center;
            justify-content: center;
            height: 50%; 
            font-size: clamp(1.8rem, 4vh, 2.5rem); 
        }

        .icon-box img {
            max-height: 100%;
            width: auto;
            object-fit: contain;
        }

        .service-card:hover .icon-box {
            transform: scale(1.1); 
        }

        .service-card h4 {
            font-weight: 600; 
            font-size: clamp(0.7rem, 1.8vh, 1rem);
            margin-bottom: 0; 
            line-height: 1.2;
            padding: 0 5px;
        }

        /* Desain Kustom untuk Kaca Modal */
        .modal-glass {
            background: rgba(10, 20, 30, 0.6) !important;
            backdrop-filter: blur(15px);
            -webkit-backdrop-filter: blur(15px);
            border: 1px solid rgba(255, 255, 255, 0.2);
            border-radius: 20px;
        }
        
        .modal-card {
            aspect-ratio: 1 / 1;
            background: rgba(255, 255, 255, 0.1);
        }
        
        .modal-card h4 {
            font-size: clamp(0.6rem, 1.5vh, 0.85rem);
